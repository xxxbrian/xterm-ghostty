name: Update terminfo

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-terminfo
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check out Ghostty
        run: git clone --depth=1 --filter=blob:none https://github.com/ghostty-org/ghostty.git upstream/ghostty

      - name: Read Ghostty Zig version
        id: zig
        run: |
          version="$(grep -E 'minimum_zig_version = "' upstream/ghostty/build.zig.zon | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$version" ]; then
            echo "Unable to read Ghostty minimum_zig_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig.outputs.version }}

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ncurses-bin jq

      - name: Generate terminfo
        run: GHOSTTY_DIR=upstream/ghostty ./scripts/update.sh

      - name: Detect terminfo changes
        id: changes
        run: |
          if git diff --quiet -- xterm-ghostty.terminfo; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read metadata
        id: metadata
        run: |
          short_sha="$(jq -r '.source.short_commit' metadata.json)"
          full_sha="$(jq -r '.source.commit' metadata.json)"
          tag="${short_sha}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"

      - name: Detect release
        id: release
        run: |
          if gh release view "${{ steps.metadata.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add xterm-ghostty.terminfo metadata.json
          git commit -m "chore: update terminfo from ghostty ${{ steps.metadata.outputs.short_sha }}"
          git tag -a "${{ steps.metadata.outputs.tag }}" -m "xterm-ghostty from ghostty ${{ steps.metadata.outputs.full_sha }}"
          git push origin HEAD:main
          git push origin "${{ steps.metadata.outputs.tag }}"

      - name: Ensure release tag
        if: steps.changes.outputs.changed != 'true' && steps.release.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse -q --verify "refs/tags/${{ steps.metadata.outputs.tag }}" >/dev/null; then
            git tag -a "${{ steps.metadata.outputs.tag }}" -m "xterm-ghostty from ghostty ${{ steps.metadata.outputs.full_sha }}"
          fi
          git push origin "${{ steps.metadata.outputs.tag }}"

      - name: Create release
        if: steps.changes.outputs.changed == 'true' || steps.release.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.metadata.outputs.tag }}" \
            xterm-ghostty.terminfo \
            metadata.json \
            --title "xterm-ghostty ${{ steps.metadata.outputs.short_sha }}" \
            --notes "Generated from ghostty-org/ghostty@${{ steps.metadata.outputs.full_sha }}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
